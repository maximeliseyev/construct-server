syntax = "proto3";

package shared.proto.services.v1;

import "core/identity.proto";

// AuthService - Authentication & session management
service AuthService {
  // GetPoWChallenge - Anti-spam challenge for device registration
  rpc GetPowChallenge(GetPowChallengeRequest) returns (GetPowChallengeResponse);

  // RegisterDevice - Passwordless device registration
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);

  // AuthenticateDevice - Passwordless device authentication
  rpc AuthenticateDevice(AuthenticateDeviceRequest) returns (AuthenticateDeviceResponse);

  // RefreshToken - Refresh access token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // VerifyToken - Validate access token
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);

  // Logout - Revoke session tokens
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // =========================================================================
  // Account Recovery (Seed Phrase)
  // =========================================================================

  // SetRecoveryKey - Set recovery public key (derived from seed phrase)
  // Called once during initial setup, cannot be changed later
  // Recovery key = Ed25519 public key derived from BIP39 seed
  rpc SetRecoveryKey(SetRecoveryKeyRequest) returns (SetRecoveryKeyResponse);

  // GetRecoveryStatus - Check if recovery is set up for account
  // Called on app startup to show recovery setup prompt if needed
  rpc GetRecoveryStatus(GetRecoveryStatusRequest) returns (GetRecoveryStatusResponse);

  // RecoverAccount - Recover account using seed phrase
  // Proves ownership by signing challenge with recovery key
  // Creates new device, revokes all existing sessions
  rpc RecoverAccount(RecoverAccountRequest) returns (RecoverAccountResponse);

  // StoreRecoveryBundle - Upload encrypted social recovery bundle (authenticated)
  // Bundle is ChaCha20-Poly1305 encrypted — server never sees plaintext
  rpc StoreRecoveryBundle(StoreRecoveryBundleRequest) returns (StoreRecoveryBundleResponse);

  // GetRecoveryBundle - Fetch encrypted bundle by username (unauthenticated)
  // Safe to be public because the bundle is strongly encrypted
  rpc GetRecoveryBundle(GetRecoveryBundleRequest) returns (GetRecoveryBundleResponse);

  // =========================================================================
  // Sealed Sender Certificate Issuance
  // =========================================================================

  // GetSenderCertificate - Get a signed sender certificate for sealed sender
  // Certificate proves sender identity to recipients without revealing it to servers.
  // Signed by this server's Ed25519 federation key.
  // Client should cache the certificate for up to 24 hours.
  rpc GetSenderCertificate(GetSenderCertificateRequest) returns (GetSenderCertificateResponse);

  // IssueTokens - Issue Privacy Pass blind tokens (OPRF Ristretto255)
  // Authenticated via JWT. Client sends blinded Ristretto points; server evaluates
  // k * blinded for each, where k = TOKEN_ISSUER_KEY scalar.
  // Client unblinds to derive unlinkable one-time tokens for anonymous STEALTH sends.
  // Rate limited: 20 tokens/hour per user.
  rpc IssueTokens(IssueTokensRequest) returns (IssueTokensResponse);

  // ApproveJoinRequest - Phone approves TUI device link (Flow B)
  // Authenticated: requires valid JWT from the primary/existing device
  // Creates the device in DB and returns auth tokens for the new device
  rpc ApproveJoinRequest(ApproveJoinRequestRequest) returns (ApproveJoinRequestResponse);
}

// DeviceService - Device management
service DeviceService {
  // ListDevices - List all devices for current user
  rpc ListDevices(ListDevicesRequest) returns (stream ListDevicesResponse);

  // RevokeDevice - Revoke device (logout remotely)
  rpc RevokeDevice(RevokeDeviceRequest) returns (RevokeDeviceResponse);

  // UpdatePushToken - Update push notification token
  rpc UpdatePushToken(UpdatePushTokenRequest) returns (UpdatePushTokenResponse);

  // UnregisterPushToken - Remove push token when notifications are disabled or on logout
  rpc UnregisterPushToken(UnregisterPushTokenRequest) returns (UnregisterPushTokenResponse);

  // VerifyDevice - Verify device (2FA)
  rpc VerifyDevice(VerifyDeviceRequest) returns (VerifyDeviceResponse);

  // GetDeviceInfo - Get specific device details
  rpc GetDeviceInfo(GetDeviceInfoRequest) returns (GetDeviceInfoResponse);

  // =========================================================================
  // Device Linking
  // =========================================================================

  // InitiateDeviceLink - Primary device generates a short-lived QR link token
  // Authenticated: requires valid JWT from the primary/existing device
  rpc InitiateDeviceLink(InitiateDeviceLinkRequest) returns (InitiateDeviceLinkResponse);
}

// DeviceLinkService - Device linking flow (separate service to avoid auth middleware)
service DeviceLinkService {
  // ConfirmDeviceLink - New device completes the link using the QR token (Flow A)
  // NOT authenticated: new device has no JWT yet, uses link_token instead
  rpc ConfirmDeviceLink(ConfirmDeviceLinkRequest) returns (ConfirmDeviceLinkResponse);

  // SubmitJoinRequest - TUI device submits a join request (Flow B)
  // NOT authenticated: the TUI device has no JWT yet
  // Stores device keys + metadata in Redis for 10 minutes
  rpc SubmitJoinRequest(JoinRequestPayload) returns (JoinRequestAck);

  // CheckJoinRequestStatus - TUI polls to check if phone approved (Flow B)
  // NOT authenticated: still waiting for approval
  rpc CheckJoinRequestStatus(CheckJoinRequestStatusRequest) returns (CheckJoinRequestStatusResponse);
}

// === AuthService Messages ===

message GetPowChallengeRequest {}

message GetPowChallengeResponse {
  string challenge = 1;
  uint32 difficulty = 2;
  int64 expires_at = 3;
}

message DevicePublicKeys {
  string verifying_key = 1;
  string identity_public = 2;
  string signed_prekey_public = 3;
  string signed_prekey_signature = 4;
  string crypto_suite = 5;
}

message PowSolution {
  string challenge = 1;
  uint64 nonce = 2;
  string hash = 3;
}

message RegisterDeviceRequest {
  optional string username = 1;
  string device_id = 2;
  DevicePublicKeys public_keys = 3;
  PowSolution pow_solution = 4;
}

message AuthenticateDeviceRequest {
  string device_id = 1;
  int64 timestamp = 2;
  string signature = 3;
}

// AuthTokensResponse - returned for all device auth/linking operations
message AuthTokensResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_at = 4;

  // ICE (obfs4) bridge cert for transport obfuscation.
  // Populated only when the server has ICE_ENABLED=true.
  optional string ice_bridge_cert = 5;
}

// Per-RPC response wrappers (buf lint RPC_RESPONSE_STANDARD_NAME)
// Each wraps AuthTokensResponse so callers get a uniquely-named type
// while the shared token payload can still evolve independently.
message RegisterDeviceResponse {
  AuthTokensResponse tokens = 1;
}

message AuthenticateDeviceResponse {
  AuthTokensResponse tokens = 1;
}

message ApproveJoinRequestResponse {
  AuthTokensResponse tokens = 1;
}

message ConfirmDeviceLinkResponse {
  AuthTokensResponse tokens = 1;
}

// RefreshTokenRequest - Refresh access token
message RefreshTokenRequest {
  // Refresh token
  string refresh_token = 1;

  // Device ID
  string device_id = 2;
}

// RefreshTokenResponse - New access token
message RefreshTokenResponse {
  // New access token
  string access_token = 1;

  // New refresh token (optional, may rotate)
  optional string refresh_token = 2;

  // Token expiration
  int64 expires_at = 3;
}

// VerifyTokenRequest - Validate token
message VerifyTokenRequest {
  // Access token to verify
  string access_token = 1;
}

// VerifyTokenResponse - Token validation result
message VerifyTokenResponse {
  // Valid?
  bool valid = 1;

  // User ID (if valid)
  optional string user_id = 2;

  // Device ID (if valid)
  optional string device_id = 3;

  // Expiration timestamp
  optional int64 expires_at = 4;
}

message LogoutRequest {
  string access_token = 1;
  bool all_devices = 2;
}

message LogoutResponse {
  bool success = 1;
}

// === DeviceService Messages ===

// ListDevicesRequest - List user's devices
message ListDevicesRequest {
  // Optional: filter by platform
  optional shared.proto.core.v1.DevicePlatform platform = 1;
}

// DeviceInfo - Device information
message DeviceInfo {
  // Device ID
  shared.proto.core.v1.DeviceId device = 1;

  // Device name (user-set)
  string device_name = 2;

  // Platform
  shared.proto.core.v1.DevicePlatform platform = 3;

  // Last seen timestamp
  int64 last_seen = 4;

  // Created timestamp
  int64 created_at = 5;

  // Push provider (if registered)
  optional PushProvider push_provider = 6;

  // Is this the current device?
  bool is_current = 7;

  // Device capabilities
  uint32 capabilities = 8;

  // Reserved for future features
  reserved 9 to 15;
}

// ListDevicesResponse - wraps a single device in the stream
message ListDevicesResponse {
  DeviceInfo device = 1;
}

// GetDeviceInfoResponse - wraps a single device info response
message GetDeviceInfoResponse {
  DeviceInfo device = 1;
}

// RevokeDeviceRequest - Revoke device
message RevokeDeviceRequest {
  // Device ID to revoke
  string device_id = 1;
}

// RevokeDeviceResponse - Revoke confirmation
message RevokeDeviceResponse {
  // Success
  bool success = 1;

  // Revoked device info
  DeviceInfo revoked_device = 2;
}

// UpdatePushTokenRequest - Update push token
message UpdatePushTokenRequest {
  // Device ID
  string device_id = 1;

  // Push token (from APNS/FCM/HMS)
  string push_token = 2;

  // Push provider
  PushProvider provider = 3;

  // Environment (production/sandbox)
  PushEnvironment environment = 4;
}

// UpdatePushTokenResponse - Update confirmation
message UpdatePushTokenResponse {
  // Success
  bool success = 1;
}

// UnregisterPushTokenRequest - Remove push token for a device
message UnregisterPushTokenRequest {
  // Device ID whose push token should be removed
  string device_id = 1;
}

// UnregisterPushTokenResponse - Removal confirmation
message UnregisterPushTokenResponse {
  // true if a token was removed, false if device had no registered token
  bool success = 1;
}

// VerifyDeviceRequest - Verify device (2FA)
message VerifyDeviceRequest {
  // Device ID to verify
  string device_id = 1;

  // Verification code (SMS, email, etc.)
  string verification_code = 2;
}

// VerifyDeviceResponse - Verification result
message VerifyDeviceResponse {
  // Verified?
  bool verified = 1;
}

// GetDeviceInfoRequest - Get specific device info
message GetDeviceInfoRequest {
  // Device ID
  string device_id = 1;
}

// PushProvider - Push notification provider
enum PushProvider {
  // Unspecified provider (must be 0)
  PUSH_PROVIDER_UNSPECIFIED = 0;

  // Apple Push Notification Service (iOS, macOS)
  PUSH_PROVIDER_APNS = 1;

  // Firebase Cloud Messaging (Android)
  PUSH_PROVIDER_FCM = 2;

  // Huawei Mobile Services (Huawei Android)
  PUSH_PROVIDER_HMS = 3;

  // Web Push (PWA)
  PUSH_PROVIDER_WEBPUSH = 4;

  // Reserved for future providers
  reserved 5 to 15;
}

// PushEnvironment - Push environment
enum PushEnvironment {
  // Unspecified environment (must be 0)
  PUSH_ENV_UNSPECIFIED = 0;

  // Sandbox (APNS development / debug builds)
  PUSH_ENV_SANDBOX = 1;

  // Production (App Store / TestFlight production builds)
  PUSH_ENV_PRODUCTION = 2;
}

// ============================================================================
// Account Recovery Messages
// ============================================================================

// SetRecoveryKeyRequest - Set up account recovery
message SetRecoveryKeyRequest {
  // Recovery public key (Ed25519, 32 bytes)
  // Derived from BIP39 seed phrase on client
  // Path: m/44'/0'/0'/0/0 or custom derivation
  bytes recovery_public_key = 1;

  // Signature proving possession of private key
  // Signs: "CONSTRUCT_RECOVERY_SETUP:{user_id}:{timestamp}"
  bytes setup_signature = 2;

  // Timestamp used in signature
  int64 timestamp = 3;

  // Optional: encrypted backup of key material
  // Encrypted with key derived from seed, stored server-side
  optional bytes encrypted_backup = 4;

  // Reserved for future options
  reserved 5 to 10;
}

// SetRecoveryKeyResponse - Recovery setup confirmation
message SetRecoveryKeyResponse {
  // Success
  bool success = 1;

  // Recovery key fingerprint (for display)
  string fingerprint = 2;

  // Setup timestamp
  int64 setup_at = 3;

  // Error if failed
  optional string error = 4;
}

// GetRecoveryStatusRequest - Check recovery status
message GetRecoveryStatusRequest {
  // User ID (from current auth token)
  // Empty = check for authenticated user
}

// GetRecoveryStatusResponse - Recovery status
message GetRecoveryStatusResponse {
  // Is recovery set up?
  bool is_setup = 1;

  // Recovery key fingerprint (if set up)
  optional string fingerprint = 2;

  // When recovery was set up
  optional int64 setup_at = 3;

  // When recovery was last used (for security alert)
  optional int64 last_used_at = 4;

  // Has encrypted backup?
  bool has_backup = 5;
}

// RecoverAccountRequest - Recover account with seed phrase
message RecoverAccountRequest {
  // Username or user ID to recover
  string identifier = 1;

  // Recovery challenge (obtained from GetRecoveryChallenge or embedded)
  string challenge = 2;

  // Signature over challenge using recovery private key
  bytes recovery_signature = 3;

  // New device registration (recovery creates new device)
  NewDeviceForRecovery new_device = 4;

  // Reserved for future options
  reserved 5 to 10;
}

// NewDeviceForRecovery - New device info during recovery
message NewDeviceForRecovery {
  // New device ID
  string device_id = 1;

  // Device public keys (same as RegisterDevice)
  DevicePublicKeys public_keys = 2;

  // Device name (e.g., "iPhone 15 Pro")
  string device_name = 3;

  // Platform
  shared.proto.core.v1.DevicePlatform platform = 4;
}

// RecoverAccountResponse - Recovery result
message RecoverAccountResponse {
  // Success
  bool success = 1;

  // User ID (confirmed)
  string user_id = 2;

  // New auth tokens for recovered device
  AuthTokensResponse tokens = 3;

  // Number of devices revoked
  uint32 devices_revoked = 4;

  // Recovery timestamp
  int64 recovered_at = 5;

  // Warning messages (e.g., "All existing sessions terminated")
  repeated string warnings = 6;

  // Error if failed
  optional RecoveryError error = 7;
}

// RecoveryError - Recovery failure reasons
message RecoveryError {
  // Error code
  RecoveryErrorCode code = 1;

  // Human-readable message
  string message = 2;

  // Retry allowed?
  bool retryable = 3;

  // Cooldown seconds (if rate limited)
  optional int64 cooldown_seconds = 4;
}

// RecoveryErrorCode - Recovery error codes
enum RecoveryErrorCode {
  // Unspecified error (must be 0)
  RECOVERY_ERROR_CODE_UNSPECIFIED = 0;

  // Account not found
  RECOVERY_ERROR_CODE_ACCOUNT_NOT_FOUND = 1;

  // Recovery not set up for this account
  RECOVERY_ERROR_CODE_NOT_SETUP = 2;

  // Invalid signature (wrong seed phrase)
  RECOVERY_ERROR_CODE_INVALID_SIGNATURE = 3;

  // Challenge expired
  RECOVERY_ERROR_CODE_CHALLENGE_EXPIRED = 4;

  // Too many attempts (rate limited)
  RECOVERY_ERROR_CODE_RATE_LIMITED = 5;

  // Account locked (security hold)
  RECOVERY_ERROR_CODE_ACCOUNT_LOCKED = 6;

  // Reserved for future errors
  reserved 7 to 15;
}

// ============================================================================
// Social Recovery Bundle Messages (SLIP-39 Variant A — vault key)
// ============================================================================

// StoreRecoveryBundleRequest
message StoreRecoveryBundleRequest {
  // Encrypted bundle ciphertext (nonce prepended, ChaCha20-Poly1305)
  bytes bundle_ciphertext = 1;
}

// StoreRecoveryBundleResponse
message StoreRecoveryBundleResponse {
  bool success = 1;
}

// GetRecoveryBundleRequest
message GetRecoveryBundleRequest {
  // Username to look up (public identifier)
  string username = 1;
}

// GetRecoveryBundleResponse
message GetRecoveryBundleResponse {
  // Encrypted bundle ciphertext, or empty if not set
  bytes bundle_ciphertext = 1;
  // Whether a bundle is set for this account
  bool bundle_exists = 2;
}

// ============================================================================
// Sealed Sender Certificate Messages
// ============================================================================

// GetSenderCertificateRequest - Request a signed sender certificate
// Authenticated via JWT — server derives user/device identity from the token.
message GetSenderCertificateRequest {
  // Empty — identity comes from the authenticated JWT context
}

// GetSenderCertificateResponse - Signed sender certificate
message GetSenderCertificateResponse {
  // Serialized SenderCertificate (from envelope.proto)
  bytes certificate = 1;

  // Certificate expiry (Unix seconds, typically now + 24h)
  // Client should re-fetch before this time
  int64 expires_at = 2;
}

// ============================================================================
// Device Linking Messages
// ============================================================================

// InitiateDeviceLinkRequest - Primary device starts the linking flow
// Identity is taken from the authenticated JWT (no fields needed).
message InitiateDeviceLinkRequest {
  // Empty — caller identity comes from authenticated JWT
}

// InitiateDeviceLinkResponse - Short-lived token to encode in QR code
message InitiateDeviceLinkResponse {
  // Opaque link token (32 random bytes, base64url encoded)
  // Encode this in a QR code for the new device to scan
  string link_token = 1;

  // Unix timestamp when the token expires (now + 15 minutes)
  int64 expires_at = 2;
}

// ConfirmDeviceLinkRequest - New device presents scanned QR token + its public keys
message ConfirmDeviceLinkRequest {
  // Link token from QR code (base64url, 32 bytes)
  string link_token = 1;

  // New device identifier (derived from identity key)
  string device_id = 2;

  // New device public keys for E2EE and authentication
  DevicePublicKeys public_keys = 3;
}

// ============================================================================
// Device Linking Messages — Flow B (TUI → Phone)
// ============================================================================

// JoinRequestPayload - TUI device submits its keys and metadata
message JoinRequestPayload {
  // New device identifier (derived from identity key)
  string pending_device_id = 1;

  // X25519 identity key (base64)
  string identity_public_b64 = 2;

  // Ed25519 verifying key (base64)
  string verifying_key_b64 = 3;

  // Signed prekey public (base64)
  string signed_prekey_public_b64 = 4;

  // Ed25519 signature of (prologue || spk_pub), 64 bytes (base64)
  string signed_prekey_signature_b64 = 5;

  // Human-readable device name (e.g., "MacBook Pro")
  string device_name = 6;

  // Platform identifier (e.g., "macos", "linux", "windows")
  string platform = 7;
}

// JoinRequestAck - Server acknowledges the join request was stored
message JoinRequestAck {
  // The pending_device_id that was accepted
  string pending_device_id = 1;
}

// CheckJoinRequestStatusRequest - TUI polls with its pending_device_id
message CheckJoinRequestStatusRequest {
  string pending_device_id = 1;
}

// CheckJoinRequestStatusResponse - Current status of the join request
message CheckJoinRequestStatusResponse {
  enum Status {
    PENDING = 0; // Still waiting for phone approval
    APPROVED = 1; // Phone approved — tokens included
    REJECTED = 2; // Phone rejected
    EXPIRED = 3; // TTL expired before approval
  }

  Status status = 1;

  // Populated only when status == APPROVED
  optional AuthTokensResponse tokens = 2;
}

// ApproveJoinRequestRequest - Phone approves the TUI device
message ApproveJoinRequestRequest {
  // The pending_device_id of the TUI device to approve
  string pending_device_id = 1;

  // Crypto suite to assign (e.g., "Curve25519+Ed25519")
  string crypto_suite = 2;
}

// ============================================================================
// Privacy Pass — Blind Token Issuance (ConstructPrivacyPass, Phase 2)
// ============================================================================

// IssueTokensRequest - Client sends blinded Ristretto255 points for OPRF evaluation.
// All blinded points must be valid compressed Ristretto255 encodings (32 bytes each).
// Maximum 20 points per request (enforced server-side; excess → RESOURCE_EXHAUSTED).
message IssueTokensRequest {
  // Each entry is a 32-byte compressed Ristretto255 point: blinded = r * T.
  // r = random scalar (client secret), T = hash_to_ristretto255(nonce).
  repeated bytes blinded_points = 1;
}

// IssueTokensResponse - Server returns evaluated Ristretto255 points.
// Each evaluated_point[i] = k * blinded_points[i], where k = TOKEN_ISSUER_KEY.
// Returned in the same order as the request.
message IssueTokensResponse {
  // Each entry is a 32-byte compressed Ristretto255 point: Z = k * blinded.
  // Client unblinds: N = r_inv * Z = k * T, then derives token via HKDF.
  repeated bytes evaluated_points = 1;
  // 32-byte compressed Ristretto255 public key: K = k * G.
  // Client uses this to verify the evaluation (DLEQ proof in future version).
  bytes server_pubkey = 2;
}
