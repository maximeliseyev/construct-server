# ============================================================================
# Coturn — Production server (turn.ams.konstruct.cc)
# ============================================================================
#
# Install:
#   sudo apt install -y coturn
#   sudo cp ops/coturn/turnserver-prod.conf /etc/turnserver.conf
#   sudo systemctl enable coturn && sudo systemctl start coturn
#
# Firewall (ufw):
#   ufw allow 3478/udp
#   ufw allow 3478/tcp
#   ufw allow 5349/tcp
#   ufw allow 49152:65535/udp    # media relay range
#
# DNS: A record  turn.ams.konstruct.cc → <prod server public IP>
# TLS cert:
#   certbot certonly --standalone -d turn.ams.konstruct.cc
#
# IMPORTANT: Replace CHANGEME_SAME_AS_TURN_SECRET with the value of
# TURN_SECRET from your secrets.env (must match signaling-service).
# ============================================================================

listening-port=3478
tls-listening-port=5349

# Required when server has a single public IP with no NAT.
# If behind NAT (e.g. cloud VM), use: external-ip=<PUBLIC_IP>/<INTERNAL_IP>
# external-ip=<PUBLIC_IP>

realm=konstruct.cc

# HMAC-SHA1 temporary credentials (RFC 8489)
# Must match TURN_SECRET in signaling-service env
use-auth-secret
static-auth-secret=CHANGEME_SAME_AS_TURN_SECRET

# TLS certificates (Let's Encrypt)
cert=/etc/letsencrypt/live/turn.ams.konstruct.cc/fullchain.pem
pkey=/etc/letsencrypt/live/turn.ams.konstruct.cc/privkey.pem

# Strong TLS only — no legacy ciphers
cipher-list="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
no-tlsv1
no-tlsv1_1

# UDP relay port range
min-port=49152
max-port=65535

# Logging — no verbose in prod
log-file=/var/log/coturn/coturn.log
syslog

# Security
no-auth-pings
no-multicast-peers
no-software-attribute

# SSRF protection: block relay to RFC-1918 + loopback + link-local
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=240.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Fingerprint in TURN messages (recommended)
fingerprint
