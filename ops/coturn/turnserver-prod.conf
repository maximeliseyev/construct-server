# ============================================================================
# Coturn — Production server (ams.konstruct.cc)
# ============================================================================
#
# Install:
#   sudo apt install -y coturn
#   sudo cp ops/coturn/turnserver-prod.conf /etc/turnserver.conf
#   sudo systemctl enable coturn && sudo systemctl start coturn
#
# Firewall (ufw / iptables):
#   ufw allow 3478/udp
#   ufw allow 3478/tcp
#   ufw allow 5349/tcp
#   ufw allow 49152:65535/udp    # media relay range
#
# DNS: A record  turn.ams.konstruct.cc → <prod server public IP>
# TLS cert:
#   certbot certonly --standalone -d turn.ams.konstruct.cc
#   # Then set cert/pkey paths below
# ============================================================================

listening-port=3478
tls-listening-port=5349

# Public IP of this server (required when behind NAT — set explicitly)
# external-ip=<PUBLIC_IP>

realm=konstruct.cc

# HMAC-SHA1 temporary credentials (RFC 8489)
# Must match TURN_SECRET in signaling-service env
use-auth-secret
static-auth-secret=CHANGEME_SAME_AS_TURN_SECRET

# TLS certificates (Let's Encrypt)
cert=/etc/letsencrypt/live/turn.ams.konstruct.cc/fullchain.pem
pkey=/etc/letsencrypt/live/turn.ams.konstruct.cc/privkey.pem

# UDP relay port range
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/coturn.log
verbose

# Security: disable plain-text auth methods, allow only HMAC
no-auth-pings
no-multicast-peers

# Fingerprint in TURN messages (recommended)
fingerprint

# Disable STUN-only mode (we want full TURN relay)
# no-stun   <- leave commented, we serve STUN too
