# ============================================================================
# Coturn — ICE relay server (ice.konstruct.cc / Yandex Cloud VM)
# ============================================================================
#
# Install:
#   sudo apt install -y coturn
#   sudo cp ops/coturn/turnserver-ice.conf /etc/turnserver.conf
#   sudo systemctl enable coturn && sudo systemctl start coturn
#
# Firewall (ufw):
#   ufw allow 3478/udp
#   ufw allow 3478/tcp
#   ufw allow 5349/tcp
#   ufw allow 49152:65535/udp    # media relay range
#
# Nginx on this server already occupies port 9443 (obfs4 relay) — no conflict.
#
# DNS: A record  turn.msk.konstruct.cc → <Yandex Cloud VM public IP>
# TLS cert:
#   certbot certonly --standalone --pre-hook "systemctl stop nginx" \
#     --post-hook "systemctl start nginx" -d turn.msk.konstruct.cc
#   # Or use webroot if nginx has a vhost for turn.msk.konstruct.cc
# ============================================================================

listening-port=3478
tls-listening-port=5349

# Public IP of this VM (required for Yandex Cloud — VMs are behind NAT)
# external-ip=<YANDEX_VM_PUBLIC_IP>/<INTERNAL_IP>   e.g. 84.201.x.x/10.0.0.x

realm=konstruct.cc

# HMAC-SHA1 temporary credentials — SAME secret as production TURN
use-auth-secret
static-auth-secret=CHANGEME_SAME_AS_TURN_SECRET

# TLS certificates (Let's Encrypt)
cert=/etc/letsencrypt/live/turn.msk.konstruct.cc/fullchain.pem
pkey=/etc/letsencrypt/live/turn.msk.konstruct.cc/privkey.pem

# UDP relay port range
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/coturn.log
verbose

# Security
no-auth-pings
no-multicast-peers
fingerprint
