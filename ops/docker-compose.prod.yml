# =============================================================================
# Construct Server — Production Docker Compose
# =============================================================================
# Architecture:
#   Traefik — TLS termination (Let's Encrypt ACME) + routing
#     ├→ ams.konstruct.cc              → Envoy (:8080, gRPC API)
#     ├→ grafana.ams.konstruct.cc      → Grafana (:3000)
#     └→ prometheus.ams.konstruct.cc   → Prometheus (:9090)
#   relay-ams — construct-relay on ice.ams.konstruct.cc
#     Traefik does TCP SNI passthrough (not TLS termination).
#     relay-ams handles its own TLS (self-signed cert, SPKI-pinned in iOS).
#     Upstream: loops back to INSTANCE_DOMAIN:443 (Traefik → Envoy).
#     After first start, read SPKI from relay-ams logs and set in iOS ICEConfig.
#   Envoy — gRPC-web routing to Rust microservices
#
# Secrets management:
#   /opt/construct/secrets/app.env — manually maintained on the server.
#   Template: ops/secrets.example.env
#   Services read secrets directly from this file (no vault-agent).
#
# DNS: A record ams.konstruct.cc → VPS IP (no Cloudflare proxy)
# TLS: Traefik auto-obtains Let's Encrypt certs via TLS-ALPN-01
#
# External services (not in this compose):
#   Database : Supabase (DATABASE_URL in app.env)
#   Redis    : Upstash  (REDIS_URL in app.env)
#
# First-time setup (run from REPO ROOT):
#   1. cp ops/secrets.example.env /opt/construct/secrets/app.env
#   2. nano /opt/construct/secrets/app.env   # fill in all values
#   3. chmod 600 /opt/construct/secrets/app.env
#   4. cp ops/.env.example .env && nano .env
#   5. docker compose -f ops/docker-compose.prod.yml --env-file .env up -d
#
# Redeploy after code changes:
#   git pull && docker compose -f ops/docker-compose.prod.yml --env-file .env up -d
# =============================================================================

name: construct

services:
  # ─── Traefik (TLS + routing) ─────────────────────────────────────────────
  # Handles Let's Encrypt certificates via TLS-ALPN-01 challenge.
  # All external traffic enters through Traefik on ports 80/443.
  # HTTP automatically redirects to HTTPS.

  traefik:
    image: traefik:v3.6
    environment:
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=construct_internal"
      # HTTP entrypoint — redirect to HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # 1000 concurrent HTTP/2 streams per connection — 250 (old default) was too low for
      # mobile clients that share one persistent connection for heartbeat + unary RPCs.
      # When the limit was exceeded Traefik sent GOAWAY, causing gRPC-swift to enter
      # TRANSIENT_FAILURE and fail all subsequent RPCs with "connection preface" errors.
      - "--entrypoints.websecure.http2.maxConcurrentStreams=1000"
      # Disable timeouts for long-lived gRPC bidirectional streams
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0s"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0s"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=0s"
      # Let's Encrypt ACME (TLS-ALPN-01 — works without Cloudflare)
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@konstruct.cc}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      # Dashboard
      - "--api.dashboard=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${INSTANCE_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth-basic"
      - "traefik.http.middlewares.auth-basic.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # ─── Envoy (gRPC-web routing) ─────────────────────────────────────────────

  envoy:
    image: envoyproxy/envoy:v1.37.0
    restart: unless-stopped
    volumes:
      - ./envoy.docker.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - internal
    depends_on:
      - auth
      - user
      - messaging
      - notification
      - signaling
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.envoy.rule=Host(`${INSTANCE_DOMAIN}`) || HeaderRegexp(`content-type`, `application/grpc`)"
      - "traefik.http.routers.envoy.entrypoints=websecure"
      - "traefik.http.routers.envoy.tls.certresolver=letsencrypt"
      - "traefik.http.services.envoy.loadbalancer.server.port=8080"
      - "traefik.http.services.envoy.loadbalancer.server.scheme=h2c"
      - "traefik.http.routers.envoy.middlewares=cors"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,POST,OPTIONS"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=Content-Type,Authorization,X-Grpc-Web,X-User-Agent,X-CSRF-Token,Grpc-Timeout"
      - "traefik.http.middlewares.cors.headers.accesscontrolexposeheaders=Grpc-Status,Grpc-Message,Grpc-Encoding,Grpc-Accept-Encoding"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=${CORS_ALLOWED_ORIGINS:-*}"
      - "traefik.http.middlewares.cors.headers.addvaryheader=true"

  # ─── Core Services ─────────────────────────────────────────────────────────
  # All services:
  #   - Use env_file from Vault-populated /secrets/app.env (via volume mount)
  #   - Only non-secret env vars (PORT, RUST_LOG, INSTANCE_DOMAIN) set here
  #   - Read secrets from /opt/construct/secrets/app.env (managed manually on server)

  auth:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/auth-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env # managed manually: see ops/secrets.example.env
        required: true
    environment:
      PORT: "8081"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: auth
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      APNS_ENABLED: ${APNS_ENABLED:-true}
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-production}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-/secrets/AuthKey_TKYQ5KVW7P.p8}
      MAX_MESSAGES_PER_HOUR: ${MAX_MESSAGES_PER_HOUR:-1000}
      MESSAGE_TTL_DAYS: ${MESSAGE_TTL_DAYS:-7}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-localhost:9092}
      DELIVERY_ACK_MODE: ${DELIVERY_ACK_MODE:-at_least_once}
      DELIVERY_EXPIRY_DAYS: ${DELIVERY_EXPIRY_DAYS:-7}
      DELIVERY_QUEUE_PREFIX: ${DELIVERY_QUEUE_PREFIX:-delivery}
      OFFLINE_QUEUE_PREFIX: ${OFFLINE_QUEUE_PREFIX:-offline}
      ONLINE_CHANNEL: ${ONLINE_CHANNEL:-online}
      ICE_ENABLED: ${ICE_ENABLED:-true}
      ICE_SERVER_KEY: ${ICE_SERVER_KEY}
      USERNAME_HMAC_SECRET: ${USERNAME_HMAC_SECRET}
      CONTACT_HMAC_SECRET: ${CONTACT_HMAC_SECRET}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  user:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/user-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8082"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: user
      USERNAME_HMAC_SECRET: ${USERNAME_HMAC_SECRET}
      CONTACT_HMAC_SECRET: ${CONTACT_HMAC_SECRET}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  messaging:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/messaging-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8083"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: messaging
      MAX_MESSAGES_PER_HOUR: ${MAX_MESSAGES_PER_HOUR:-1000}
      MESSAGE_TTL_DAYS: ${MESSAGE_TTL_DAYS:-7}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-localhost:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-messages}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-construct-delivery}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SSL_ENABLED: ${KAFKA_SSL_ENABLED:-false}
      DELIVERY_QUEUE_PREFIX: ${DELIVERY_QUEUE_PREFIX:-delivery}
      APNS_ENABLED: ${APNS_ENABLED:-true}
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-production}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-/secrets/AuthKey_TKYQ5KVW7P.p8}
      CONTACT_HMAC_SECRET: ${CONTACT_HMAC_SECRET}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification:50054}
      SENTINEL_SERVICE_URL: ${SENTINEL_SERVICE_URL:-http://sentinel:50059}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal
    depends_on:
      - notification

  notification:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/notification-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8084"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: notification
      APNS_ENABLED: ${APNS_ENABLED:-true}
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-production}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-/secrets/AuthKey_TKYQ5KVW7P.p8}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  invite:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/invite-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8086"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: invite
      CONTACT_HMAC_SECRET: ${CONTACT_HMAC_SECRET}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  key:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/key-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: key
      USERNAME_HMAC_SECRET: ${USERNAME_HMAC_SECRET}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  media:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/media-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8087"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: media
      MEDIA_PUBLIC_HOST: ${INSTANCE_DOMAIN}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  # mls-service is a v2 stub (all endpoints return Unimplemented).
  # Disabled until MLS group chat is implemented to avoid wasting resources.
  # mls:
  #   image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
  #   command: /usr/local/bin/mls-service
  #   restart: unless-stopped
  #   env_file:
  #     - path: /opt/construct/secrets/app.env
  #       required: true
  #   environment:
  #     RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
  #     METRICS_PORT: "8091"
  #   volumes:
  #     - /opt/construct/secrets:/secrets:ro
  #   networks:
  #     - internal

  sentinel:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/sentinel-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: sentinel
      METRICS_PORT: "8090"
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  signaling:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/signaling-service
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: signaling
      PORT: "50060"
      METRICS_PORT: "8091"
      CONTACT_HMAC_SECRET: ${CONTACT_HMAC_SECRET}
      TURN_HOSTS: ${TURN_HOSTS:-turn.ams.konstruct.cc,turn.msk.konstruct.cc}
      TURN_SECRET: ${TURN_SECRET}
      TURN_CREDENTIALS_TTL_SECONDS: ${TURN_CREDENTIALS_TTL_SECONDS:-3600}
      NOTIFICATION_GRPC_ENDPOINT: "http://notification:50054"
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  delivery:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/delivery-worker
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8085"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: delivery
      DELIVERY_ACK_MODE: ${DELIVERY_ACK_MODE:-at_least_once}
      DELIVERY_EXPIRY_DAYS: ${DELIVERY_EXPIRY_DAYS:-7}
      DELIVERY_QUEUE_PREFIX: ${DELIVERY_QUEUE_PREFIX:-delivery}
      OFFLINE_QUEUE_PREFIX: ${OFFLINE_QUEUE_PREFIX:-offline}
      ONLINE_CHANNEL: ${ONLINE_CHANNEL:-online}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-localhost:9092}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SSL_ENABLED: ${KAFKA_SSL_ENABLED:-false}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-construct-delivery}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-messages}
      KAFKA_PRODUCER_ACKS: ${KAFKA_PRODUCER_ACKS:-all}
      KAFKA_PRODUCER_COMPRESSION: ${KAFKA_PRODUCER_COMPRESSION:-none}
      CONTACT_HMAC_SECRET: ${CONTACT_HMAC_SECRET}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  gateway:
    image: ghcr.io/maximeliseyev/construct-server:${IMAGE_TAG:-0.12.0}
    command: /usr/local/bin/gateway
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "3000"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: gateway
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      ICE_ENABLED: ${ICE_ENABLED:-true}
      ICE_SERVER_KEY: ${ICE_SERVER_KEY}
      ICE_UPSTREAM: "envoy:8080"
      # Relay addresses advertised in /.well-known/construct-server.
      # Port 443 = TLS-wrapped obfs4 (Traefik terminates TLS on the relay server).
      # Add more relays as comma-separated list: "ice.msk.konstruct.cc:443,ice.sgp.konstruct.cc:443"
      ICE_RELAY_ADDRESSES: ${ICE_RELAY_ADDRESSES:-ice.msk.konstruct.cc:443,ice.ams.konstruct.cc:443}
      # ICE_TLS_CERT_PATH / ICE_TLS_KEY_PATH: not set here — Traefik terminates TLS.
      # Set these only for deployments where gateway is exposed directly without Traefik.
    ports:
      # Port 9443 still exposed for legacy plain-obfs4 clients (no TLS wrapper).
      # New clients use port 443 via Traefik TCP router below.
      - "9443:9443"
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal
    labels:
      - "traefik.enable=false"
      # Legacy plain-obfs4 is still reachable on direct port 9443 (host-exposed).
      # ice.INSTANCE_DOMAIN:443 is now handled by relay-ams (TCP passthrough).

  # ─── ICE Relay (construct-relay on ice.INSTANCE_DOMAIN) ─────────────────────
  # construct-relay manages its own TLS (self-signed cert, SPKI-pinned in iOS).
  # Traefik does SNI-based TCP passthrough — it does NOT terminate TLS here.
  # Upstream: envoy:8080 (h2c, same internal Docker network).
  # Using envoy:8080 directly avoids hairpin NAT (INSTANCE_DOMAIN:443 → Traefik
  # → internal network from inside Docker often fails on cloud VMs).
  # Envoy accepts cleartext H2 (h2c) on port 8080 per traefik h2c scheme label.
  #
  # First-time setup:
  #   1. docker compose ... up -d relay-ams
  #   2. docker compose ... logs relay-ams | grep SPKI
  #   3. Copy the hex SPKI fingerprint into iOS ICEConfig.amsRelayPinnedSPKI
  #   4. Rebuild and deploy iOS app

  relay-ams:
    image: ghcr.io/maximeliseyev/construct-relay:latest
    restart: unless-stopped
    environment:
      LISTEN_ADDR: "0.0.0.0:9444"
      UPSTREAM: "envoy:8080"
      UPSTREAM_TLS: "false"
      STATE_DIR: "/data"
      TLS_SNI_HOST: "ice.${INSTANCE_DOMAIN}"
      WT_PATH: "/construct-ice"
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - relay-ams-state:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # TCP SNI passthrough — relay-ams handles its own TLS (SPKI-pinned by iOS).
      # HostSNI matching requires passthrough=true in Traefik v3.
      - "traefik.tcp.routers.ice.rule=HostSNI(`ice.${INSTANCE_DOMAIN}`)"
      - "traefik.tcp.routers.ice.entrypoints=websecure"
      - "traefik.tcp.routers.ice.tls.passthrough=true"
      - "traefik.tcp.services.ice.loadbalancer.server.port=9444"

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: construct-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${INSTANCE_DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prometheus.middlewares=auth-basic"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: construct-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "https://grafana.${INSTANCE_DOMAIN}"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    networks:
      - internal
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${INSTANCE_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  traefik-certs:
  prometheus-data:
  grafana-data:
  relay-ams-state:

networks:
  internal:
    driver: bridge
