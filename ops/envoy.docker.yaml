# Envoy Configuration for Docker Compose (DigitalOcean VPS)
# Services are addressed by Docker container name, not localhost.
# gRPC routes use full package paths: /shared.proto.services.v1.<ServiceName>

admin:
  address:
    socket_address:
      address: 127.0.0.1   # admin only on loopback
      port_value: 9901

static_resources:
  listeners:
    - name: grpc_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      # Larger per-connection TCP buffer (default 1 MiB) prevents buffer-pressure RSTs
      # when many concurrent gRPC streams burst data at the same time.
      per_connection_buffer_limit_bytes: 10485760  # 10 MiB
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                # Traefik always sends h2c Prior Knowledge — explicit HTTP2 avoids the
                # AUTO codec-detection overhead and removes one class of "connection
                # preface" failures when the first bytes arrive fragmented.
                codec_type: HTTP2
                stat_prefix: ingress_grpc
                # Disable stream idle timeout — gRPC streams can be long-lived
                stream_idle_timeout: 0s
                # Give open streams up to 5s to drain before the connection is closed.
                # Without this, Envoy RSTs mid-flight streams when rotating connections.
                drain_timeout: 5s
                # Delay the final FIN/RST by 1s so that any data already enqueued in the
                # kernel send buffer has time to be flushed to the client.
                delayed_close_timeout: 1s
                # HTTP/2 keepalive: send PING frames every 30s so mobile clients
                # (iOS/Android) don't close the connection after 5 min idle.
                # Enlarged flow-control windows reduce head-of-line blocking for
                # concurrent gRPC streams sharing the same H2 connection.
                # max_requests_per_connection: rotating connections after N requests lets
                # Envoy issue a graceful GOAWAY instead of an abrupt RST when the
                # connection is retired. Clients transparently reconnect.
                http2_protocol_options:
                  connection_keepalive:
                    interval: 30s
                    timeout: 10s
                  initial_stream_window_size: 2097152     # 2 MiB (default 64 KiB)
                  initial_connection_window_size: 4194304 # 4 MiB (default 64 KiB)
                  max_requests_per_connection: 10000      # graceful GOAWAY every 10k reqs
                route_config:
                  name: grpc_routes
                  virtual_hosts:
                    - name: grpc_services
                      domains: ["*"]
                      routes:
                        # Auth & Device services (auth-service binary)
                        - match: { prefix: "/shared.proto.services.v1.AuthService" }
                          route: { cluster: auth_service, timeout: 30s }
                        - match: { prefix: "/shared.proto.services.v1.DeviceService" }
                          route: { cluster: auth_service, timeout: 30s }
                        # User service
                        - match: { prefix: "/shared.proto.services.v1.UserService" }
                          route: { cluster: user_service, timeout: 30s }
                        # Messaging service (streaming — no timeout)
                        - match: { prefix: "/shared.proto.services.v1.MessagingService" }
                          route: { cluster: messaging_service, timeout: 0s }
                        - match: { prefix: "/construct.message_gateway.v1.MessageGateway" }
                          route: { cluster: messaging_service, timeout: 0s }
                        # Notification service
                        - match: { prefix: "/shared.proto.services.v1.NotificationService" }
                          route: { cluster: notification_service, timeout: 30s }
                        # Invite service
                        - match: { prefix: "/shared.proto.services.v1.InviteService" }
                          route: { cluster: invite_service, timeout: 30s }
                        # Key service (prekeys)
                        - match: { prefix: "/shared.proto.services.v1.KeyService" }
                          route: { cluster: key_service, timeout: 30s }
                        # Media service
                        - match: { prefix: "/shared.proto.services.v1.MediaService" }
                          route: { cluster: media_service, timeout: 60s }
                        # MLS service — stub (disabled in docker-compose.prod.yml until v2).
                        # Envoy returns 503 if a client calls MLS endpoints while mls container is down.
                        - match: { prefix: "/shared.proto.services.v1.MlsService" }
                          route: { cluster: mls_service, timeout: 30s }
                        # Sentinel service
                        - match: { prefix: "/shared.proto.sentinel.v1.SentinelService" }
                          route: { cluster: sentinel_service, timeout: 30s }
                        # Signaling service (WebRTC calls)
                        - match: { prefix: "/shared.proto.signaling.v1.SignalingService" }
                          route: { cluster: signaling_service, timeout: 300s, max_stream_duration: { max_stream_duration: 300s } }
                          # Long-lived bidirectional streams for calls
                        # Discovery & health (gateway binary)
                        - match: { prefix: "/.well-known" }
                          route: { cluster: discovery_service, timeout: 5s }
                        - match: { prefix: "/health" }
                          route: { cluster: discovery_service, timeout: 5s }
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: auth_service
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options:
              connection_keepalive:
                interval: 30s
                timeout: 10s
      load_assignment:
        cluster_name: auth_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: auth, port_value: 50051 }

    - name: user_service
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options:
              connection_keepalive:
                interval: 30s
                timeout: 10s
      load_assignment:
        cluster_name: user_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: user, port_value: 50052 }

    - name: messaging_service
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options:
              connection_keepalive:
                interval: 20s
                timeout: 10s
              # Match the enlarged flow-control windows configured on the tonic server
              # and the downstream listener to avoid back-pressure stalls on large messages.
              initial_stream_window_size: 2097152     # 2 MiB
              initial_connection_window_size: 4194304 # 4 MiB
      load_assignment:
        cluster_name: messaging_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: messaging, port_value: 50053 }

    - name: notification_service
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      connect_timeout: 5s
