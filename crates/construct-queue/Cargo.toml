[package]
name = "construct-queue"
version.workspace = true
edition.workspace = true

[dependencies]
construct-config = { path = "../construct-config" }
construct-redis  = { path = "../construct-redis" }
construct-broker = { path = "../construct-broker" }
construct-crypto = { path = "../construct-crypto", features = ["full"] }

# Serialization
serde        = { version = "1.0", features = ["derive"] }
serde_json   = "1.0"
rmp-serde    = "1.3"

# Async
tokio  = { version = "1.40", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"

# Utils
sha2      = "0.10"
hex       = { workspace = true }
redis     = { version = "1.0", features = ["tokio-comp", "connection-manager", "streams", "tokio-native-tls-comp"] }
chrono    = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1.40", features = ["full", "test-util"] }
